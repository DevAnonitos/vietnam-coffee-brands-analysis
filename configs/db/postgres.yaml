source:
  name: postgres
  type: database
  description: ""

credentials:
  host_env: POSTGRES_HOST
  port_env: POSTGRES_PORT
  database_env: POSTGRES_DB
  user_env: POSTGRES_USER
  password_env: POSTGRES_PASSWORD

connection:
  host: localhost
  port: 5432
  database: coffee_analysis
  pool_size: 5
  max_overflow: 10
  echo: false

options:
  schema: public
  ssl_mode: prefer
