# Classification Metrics
classification:
  metrics:
    - accuracy
    - precision
    - recall
    - f1_score
    - roc_auc
  parameters:
    average: macro  # Options: macro, micro, weighted, binary
    multi_class: ovr  # Options: ovr, ovo

# Regression Metrics
regression:
  metrics:
    - mean_squared_error
    - mean_absolute_error
    - r2_score
    - mean_absolute_percentage_error
  parameters:
    # No specific parameters for regression metrics

# Clustering Metrics
clustering:
  metrics:
    - silhouette_score
    - calinski_harabasz_score
    - davies_bouldin_score
  parameters:
    # Parameters for clustering evaluation

# General Parameters
general:
  cross_validation_folds: 5
  test_size: 0.2
  random_state: 42
